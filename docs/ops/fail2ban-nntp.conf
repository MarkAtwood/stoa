# fail2ban filter for stoa-reader NNTP authentication failures
#
# Matches structured JSON log events emitted by stoa-reader when a client
# fails AUTHINFO USER/PASS authentication.  The event=auth_failure field
# is stable across releases and is documented as a stable interface.
#
# Log format requirement:
#   stoa-reader must be configured with a JSON tracing subscriber, e.g.:
#     tracing_subscriber::fmt().json().init();
#   or via the STOA_LOG_FORMAT=json environment variable if supported.
#
# Example matching log line:
#   {"timestamp":"2026-04-27T12:00:00.000Z","level":"WARN",
#    "fields":{"event":"auth_failure","service":"nntp",
#              "remote_ip":"198.51.100.42","username":"baduser",
#              "reason":"bad_password"},"target":"stoa_reader::session::lifecycle"}
#
# Installation:
#   cp fail2ban-nntp.conf /etc/fail2ban/filter.d/stoa-nntp.conf
#
# Then create /etc/fail2ban/jail.local:
#   [stoa-nntp]
#   enabled  = true
#   filter   = stoa-nntp
#   logpath  = /var/log/stoa/reader.log
#   maxretry = 10
#   findtime = 60
#   bantime  = 3600
#   action   = iptables-multiport[name=stoa-nntp, port="119,563"]
#
# Note: stoa-reader also emits event=auth_lockout at WARN when its internal
# per-IP threshold is reached (default: 10 failures in 60 s).  fail2ban
# operates independently on the auth_failure events; both mechanisms can
# coexist.

[Definition]

# Match any JSON log line with event=auth_failure and the offending IP.
# The <HOST> placeholder is replaced by fail2ban with the IP regex.
#
# Two patterns cover the common field orderings produced by serde_json
# (alphabetical) and tracing_json (insertion order):
#
#   "remote_ip":"<HOST>"  followed anywhere by  "event":"auth_failure"
#   "event":"auth_failure"  followed anywhere by  "remote_ip":"<HOST>"
failregex = .*"event"\s*:\s*"auth_failure".*"remote_ip"\s*:\s*"<HOST>".*
            .*"remote_ip"\s*:\s*"<HOST>".*"event"\s*:\s*"auth_failure".*

ignoreregex =
