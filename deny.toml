[graph]
# Analyze the entire workspace
all-features = false
no-default-features = false

[advisories]
# Deny advisories for known vulnerabilities and unmaintained crates
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]

[bans]
# Deny multiple versions of a crate; two copies indicate a dep resolution
# problem that should be resolved explicitly rather than silently allowed.
multiple-versions = "deny"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
