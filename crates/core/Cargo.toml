[package]
name = "usenet-ipfs-core"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
cid = { version = "0.11", features = ["serde-codec"] }
multihash-codetable = { version = "0.2", features = ["sha2"] }
hex = "0.4"

[dev-dependencies]
serde_json = "1"
