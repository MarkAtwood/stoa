[package]
name = "usenet-ipfs-reader"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"

[lib]
name = "usenet_ipfs_reader"
path = "src/lib.rs"

[[bin]]
name = "usenet-ipfs-reader"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
usenet-ipfs-core = { path = "../core" }
base64 = "0.22"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio-rustls", "macros", "migrate"] }
cid = { version = "0.11", features = ["serde-codec"] }
serde_json = "1"
hex = "0.4"
mailparse = "0.15"
async-trait = "0.1"
multihash-codetable = { version = "0.2", features = ["sha2"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full", "macros", "rt-multi-thread"] }
